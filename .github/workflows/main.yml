name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Fix Gradle Wrapper
      run: |
        wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip -P /tmp
        unzip -q /tmp/gradle-8.2-bin.zip -d /opt/gradle
        export PATH=$PATH:/opt/gradle/gradle-8.2/bin
        gradle --version
        gradle wrapper --gradle-version 8.2
        chmod +x gradlew

    - name: Build Debug APK
      run: |
        export PATH=$PATH:/opt/gradle/gradle-8.2/bin
        ./gradlew assembleDebug --no-daemon --stacktrace

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: volume-mixer-debug
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
